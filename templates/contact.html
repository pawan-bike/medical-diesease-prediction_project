<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>

    <style>

        body{
            margin:0;
            padding:0;
            font-family:Arial, sans-serif;
            background:#f4f4f4;
        }

        .container{
            width:50%;
            margin:40px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        h1{
            text-align:center;
            color:#0d6efd;
        }

        p{
            text-align:center;
            font-size:18px;
        }

        label{
            font-weight:bold;
        }

        input, textarea{
            width:100%;
            padding:10px;
            margin-top:5px;
            margin-bottom:20px;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:16px;
        }

        textarea{
            resize:none;
        }

        button{
            width:100%;
            padding:12px;
            background:#0d6efd;
            color:white;
            border:none;
            border-radius:5px;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#084298;
        }

        .menu{
            text-align:center;
            margin-bottom:20px;
        }

        .menu a{
            text-decoration:none;
            color:white;
            background:#0d6efd;
            padding:10px 20px;
            margin:5px;
            border-radius:5px;
        }

        .menu a:hover{
            background:#084298;
        }

        .info{
            margin-top:30px;
            text-align:center;
            font-size:18px;
        }

    </style>

</head>

<body>

<div class="container">

<h1>Contact Us</h1>

<div class="menu">
    <a href="/">Home</a>
    <a href="/about">About</a>
    <a href="/contact">Contact</a>
</div>

<p>If you have any questions or suggestions, feel free to contact us.</p>

<form>

<label>Full Name</label>
<input type="text" placeholder="pawan sahu" required>

<label>Email</label>
<input type="email" placeholder="pawansahu6073@gmail.com" required>

<label>Message</label>
<textarea rows="5" placeholder="disease prediction" required></textarea>

<button type="submit">Send Message</button>

</form>

<div class="info">

<h3>Medical Disease Prediction System</h3>

<p>Email : support@medicalprediction.com</p>

<p>Phone : +91 9876543210</p>

<p>Address : Jaipur, Rajasthan, India</p>

</div>

</div>

</body>
</html>
