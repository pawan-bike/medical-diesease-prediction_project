<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction History</title>

    <style>

        body{
            margin:0;
            padding:0;
            font-family:Arial, sans-serif;
            background:#f4f4f4;
        }

        .container{
            width:80%;
            margin:40px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        h1{
            text-align:center;
            color:#0d6efd;
        }

        .menu{
            text-align:center;
            margin-bottom:20px;
        }

        .menu a{
            text-decoration:none;
            color:white;
            background:#0d6efd;
            padding:10px 20px;
            margin:5px;
            border-radius:5px;
        }

        .menu a:hover{
            background:#084298;
        }

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:20px;
        }

        table, th, td{
            border:1px solid #ddd;
        }

        th{
            background:#0d6efd;
            color:white;
            padding:12px;
        }

        td{
            text-align:center;
            padding:10px;
        }

        tr:nth-child(even){
            background:#f2f2f2;
        }

    </style>

</head>

<body>

<div class="container">

<h1>Prediction History</h1>

<div class="menu">
    <a href="/">Home</a>
    <a href="/about">About</a>
    <a href="/contact">Contact</a>
    <a href="/history">History</a>
</div>

<table>

<tr>
    <th>Age</th>
    <th>Gender</th>
    <th>BMI</th>
    <th>Blood Pressure</th>
    <th>Predicted Disease</th>
</tr>

<tr>
    <td>25</td>
    <td>Male</td>
    <td>22.5</td>
    <td>120</td>
    <td>Healthy</td>
</tr>

<tr>
    <td>45</td>
    <td>Female</td>
    <td>30.2</td>
    <td>145</td>
    <td>Diabetes</td>
</tr>

<tr>
    <td>60</td>
    <td>Male</td>
    <td>28.4</td>
    <td>150</td>
    <td>Heart Disease</td>
</tr>

</table>

</div>

</body>
</html>
