<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Disease Prediction</title>

    <style>
        body{
            margin:0;
            padding:0;
            font-family:Arial,sans-serif;
            background:#f4f4f4;
        }

        header{
            background:#0d6efd;
            color:white;
            text-align:center;
            padding:20px;
        }

        .container{
            width:50%;
            margin:40px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            color:#0d6efd;
        }

        label{
            font-weight:bold;
        }

        input,select{
            width:100%;
            padding:10px;
            margin-top:5px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:16px;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:12px;
            background:#0d6efd;
            color:white;
            border:none;
            border-radius:5px;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#084298;
        }

        .result{
            margin-top:20px;
            text-align:center;
            font-size:22px;
            font-weight:bold;
            color:green;
        }
    </style>
</head>

<body>

<header>
    <h1>Medical Disease Prediction System</h1>
</header>

<div class="container">

    <h2>Enter Patient Details</h2>

    <form action="/project" method="POST">

        <label>Age</label>
        <input type="number" name="Age" required>

        <label>Gender</label>
        <select name="Gender" required>
            <option value="">Select Gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
        </select>

        <label>BMI</label>
        <input type="number" step="0.1" name="BMI" required>

        <label>Blood Pressure</label>
        <input type="number" name="BloodPressure" required>

        <label>Heart Rate</label>
        <input type="number" name="HeartRate" required>

        <label>Smoking</label>
        <select name="Smoking" required>
            <option value="">Select Option</option>
            <option value="Yes">Yes</option>
            <option value="No">No</option>
        </select>

        <button type="submit">Predict Disease</button>

    </form>

    {% if prediction %}
    <div class="result">
        {{ prediction }}
    </div>
    {% endif %}

</div>

</body>
</html>
